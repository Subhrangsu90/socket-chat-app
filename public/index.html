<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>BrewChat</title>
		<style>
			:root {
				--bg: #07110e;
				--panel: #0e1b17;
				--panel-2: #142722;
				--border: #29443b;
				--fg: #f6fbf8;
				--muted: #9db4aa;
				--brand: #13c98a;
				--brand-2: #f4b942;
				--ink: #06120f;
			}

			* {
				box-sizing: border-box;
			}

			body {
				min-height: 100vh;
				margin: 0;
				display: grid;
				place-items: center;
				padding: 24px;
				background:
					linear-gradient(#ffffff07 1px, transparent 1px),
					linear-gradient(90deg, #ffffff06 1px, transparent 1px),
					radial-gradient(circle at 16% 12%, #146c4d 0, transparent 30%),
					radial-gradient(circle at 86% 80%, #5c4314 0, transparent 26%),
					var(--bg);
				background-size:
					42px 42px,
					42px 42px,
					auto,
					auto,
					auto;
				color: var(--fg);
				font-family: "Segoe UI", Arial, sans-serif;
			}

			.auth-shell {
				width: min(960px, 100%);
				display: grid;
				grid-template-columns: minmax(0, 1fr) 360px;
				border: 1px solid var(--border);
				border-radius: 24px;
				overflow: hidden;
				background: linear-gradient(135deg, #0b1713 0%, #08100e 100%);
				box-shadow: 0 32px 90px #000b;
			}

			.brand-panel {
				min-height: 520px;
				padding: 42px;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				background:
					linear-gradient(135deg, #13c98a22, transparent 52%),
					linear-gradient(315deg, #f4b9421f, transparent 48%);
			}

			.logo {
				display: inline-flex;
				align-items: center;
				gap: 12px;
				font-weight: 900;
				font-size: 18px;
			}

			.logo-mark {
				width: 42px;
				height: 42px;
				display: grid;
				place-items: center;
				border-radius: 14px;
				background: linear-gradient(135deg, var(--brand), var(--brand-2));
				color: var(--ink);
				box-shadow: 0 12px 36px #13c98a44;
			}

			h1 {
				max-width: 560px;
				margin: 0;
				font-size: clamp(42px, 7vw, 76px);
				line-height: 0.95;
				letter-spacing: 0;
			}

			.brand-copy {
				max-width: 520px;
				margin: 18px 0 0;
				color: var(--muted);
				font-size: 17px;
				line-height: 1.6;
			}

			.auth-panel {
				display: flex;
				flex-direction: column;
				justify-content: center;
				gap: 18px;
				padding: 34px;
				border-left: 1px solid var(--border);
				background: #08120fdd;
			}

			.auth-panel h2 {
				margin: 0;
				font-size: 28px;
				letter-spacing: 0;
			}

			.auth-panel p {
				margin: 0;
				color: var(--muted);
				line-height: 1.5;
			}

			.actions {
				display: grid;
				gap: 10px;
				margin-top: 10px;
			}

			a {
				height: 48px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				border-radius: 12px;
				text-decoration: none;
				font-weight: 850;
			}

			.primary {
				background: linear-gradient(135deg, var(--brand), #0ea573);
				color: var(--ink);
			}

			.secondary {
				border: 1px solid var(--border);
				background: var(--panel-2);
				color: var(--fg);
			}

			.status {
				min-height: 20px;
				color: var(--muted);
				font-size: 13px;
			}

			@media (max-width: 760px) {
				body {
					padding: 0;
				}

				.auth-shell {
					min-height: 100vh;
					grid-template-columns: 1fr;
					border-radius: 0;
					border-left: 0;
					border-right: 0;
				}

				.brand-panel {
					min-height: 380px;
					padding: 28px;
				}

				.auth-panel {
					border-left: 0;
					border-top: 1px solid var(--border);
					padding: 28px;
				}
			}
		</style>
	</head>
	<body>
		<main class="auth-shell">
			<section class="brand-panel">
				<div class="logo">
					<div class="logo-mark">B</div>
					<span>BrewChat</span>
				</div>
				<div>
					<h1>BrewChat</h1>
					<p class="brand-copy">
						A focused real-time room for quick conversations,
						presence, typing, and read updates.
					</p>
				</div>
			</section>

			<section class="auth-panel">
				<h2>Welcome back</h2>
				<p>Sign in with BrewAuth to enter your chat room.</p>
				<div class="actions">
					<a
						class="primary"
						href="/auth/login">
						Sign in with BrewAuth
					</a>
					<a
						class="secondary"
						href="/auth/register">
						Create account
					</a>
				</div>
				<div
					id="status"
					class="status"></div>
			</section>
		</main>

		<script>
			fetch("/auth/me")
				.then((response) => {
					if (!response.ok) return null;
					return response.json();
				})
				.then((data) => {
					if (data?.authenticated) {
						window.location.href = "/chat";
					}
				})
				.catch(() => {
					document.getElementById("status").textContent =
						"Sign in when you are ready.";
				});
		</script>
	</body>
</html>
